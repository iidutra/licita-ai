{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — LicitaAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: .75rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.15);
      width: 100%;
      max-width: 400px;
      padding: 2.5rem 2rem 2rem;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .login-logo i {
      font-size: 2.2rem;
      color: #2563eb;
      margin-bottom: .5rem;
      display: block;
    }
    .login-logo h2 {
      font-weight: 800;
      color: #1e293b;
      font-size: 1.5rem;
      margin: 0;
      letter-spacing: -.03em;
    }
    .login-logo p {
      color: #64748b;
      font-size: .82rem;
      margin: .25rem 0 0;
    }
    .login-label {
      font-size: .8rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: .35rem;
    }
    .login-input-group {
      position: relative;
      margin-bottom: 1.15rem;
    }
    .login-input-group i {
      position: absolute;
      left: .85rem;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: .9rem;
    }
    .login-input-group input {
      padding-left: 2.5rem;
      height: 2.75rem;
      border-radius: .5rem;
      border: 1.5px solid #e2e8f0;
      font-size: .88rem;
      transition: border-color .15s;
    }
    .login-input-group input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    .login-btn {
      width: 100%;
      height: 2.75rem;
      border-radius: .5rem;
      font-weight: 600;
      font-size: .9rem;
      background: #2563eb;
      border: none;
      color: #fff;
      transition: background .15s;
    }
    .login-btn:hover {
      background: #1d4ed8;
    }
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .72rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <i class="bi bi-briefcase-fill"></i>
      <h2>LicitaAI</h2>
      <p>Inteligencia em Licitacoes</p>
    </div>

    {% if form.errors %}
    <div class="alert alert-danger py-2" style="font-size:.82rem;">
      <i class="bi bi-exclamation-circle me-1"></i> Usuario ou senha invalidos.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div>
        <label class="login-label">Usuario</label>
        <div class="login-input-group">
          <i class="bi bi-person"></i>
          <input type="text" name="username" class="form-control" autofocus required placeholder="Seu usuario">
        </div>
      </div>
      <div>
        <label class="login-label">Senha</label>
        <div class="login-input-group">
          <i class="bi bi-lock"></i>
          <input type="password" name="password" class="form-control" required placeholder="Sua senha">
        </div>
      </div>
      <button type="submit" class="login-btn">
        <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
      </button>
    </form>

    <div class="login-footer">LicitaAI v1.0</div>
  </div>
</body>
</html>
